# ─── Blueprint Render — déploiement gratuit de VOLT PC ───────────────
# Sur render.com : New ▸ Blueprint ▸ connecter ce dépôt → tout est auto-configuré.
#
# Le blueprint crée aussi une base PostgreSQL managée `voltpc-db`.
# Comptes, paniers, adresses, commandes et favoris sont donc conservés côté
# serveur, même après redéploiement.
#
# ─── Base persistante PostgreSQL (recommandé pour une vraie boutique) ───
# Pour des données qui SURVIVENT aux redéploiements :
#   1. Garder la variable DATABASE_URL ci-dessous.
#   2. Garder le bloc databases en bas de ce fichier.
#   3. Pousser : Render crée la base et l'app bascule automatiquement sur Postgres
#      (le code détecte DATABASE_URL ; sans elle, il repasse sur SQLite local).
# La base est seedée au 1er démarrage (280 produits + compte démo).

services:
  - type: web
    name: voltpc
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/categories
    envVars:
      # Démo : le code de vérification s'affiche à l'écran (pas besoin d'email).
      # ⚠️ Mettre à vide pour une vraie boutique avec de vrais clients.
      - key: DEV_SHOW_CODES
        value: "1"
      - key: CORS_ORIGINS
        value: "*"
      # Clé de signature stable (sessions conservées entre redémarrages).
      - key: VOLTPC_SECRET
        generateValue: true
      # À renseigner après le 1er déploiement avec l'URL Render
      # (https://voltpc-xxxx.onrender.com) si tu veux tester le paiement Stripe.
      - key: PUBLIC_BASE_URL
        sync: false
      # Base serveur persistante : comptes, paniers, commandes, adresses.
      - key: DATABASE_URL
        fromDatabase:
          name: voltpc-db
          property: connectionString

# ─── Base de données managée ─────────────────────────────────────────
databases:
  - name: voltpc-db
    plan: free
    databaseName: voltpc
    user: voltpc
