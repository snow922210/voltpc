# ─── Blueprint Render — déploiement gratuit de VOLT PC ───────────────
# Sur render.com : New ▸ Blueprint ▸ connecter ce dépôt → tout est auto-configuré.
#
# Plan « free » : pas de disque persistant → la base SQLite est recréée (et
# re-remplie : 280 produits + compte démo) à chaque démarrage/redéploiement.
# Parfait pour une démo. Pour conserver commandes/comptes, passer en plan payant
# et ajouter un bloc « disk: { mountPath: /data, sizeGB: 1 } » + VOLTPC_DATA_DIR=/data.
#
# ─── Base persistante PostgreSQL (recommandé pour une vraie boutique) ───
# Pour des données qui SURVIVENT aux redéploiements, sans disque payant :
#   1. Dé-commenter le bloc « databases: » en bas de ce fichier.
#   2. Dé-commenter la variable DATABASE_URL ci-dessous (fromDatabase).
#   3. Pousser : Render crée la base et l'app bascule automatiquement sur Postgres
#      (le code détecte DATABASE_URL ; sans elle, il reste sur SQLite).
# La base est seedée au 1er démarrage (280 produits + compte démo).

services:
  - type: web
    name: voltpc
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/categories
    envVars:
      # Démo : le code de vérification s'affiche à l'écran (pas besoin d'email).
      # ⚠️ Mettre à vide pour une vraie boutique avec de vrais clients.
      - key: DEV_SHOW_CODES
        value: "1"
      - key: CORS_ORIGINS
        value: "*"
      # Clé de signature stable (sessions conservées entre redémarrages).
      - key: VOLTPC_SECRET
        generateValue: true
      # À renseigner après le 1er déploiement avec l'URL Render
      # (https://voltpc-xxxx.onrender.com) si tu veux tester le paiement Stripe.
      - key: PUBLIC_BASE_URL
        sync: false
      # ─ Persistance Postgres : dé-commenter pour activer (voir en-tête) ─
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: voltpc-db
      #     property: connectionString

# ─── Base de données managée (dé-commenter avec DATABASE_URL ci-dessus) ───
# databases:
#   - name: voltpc-db
#     plan: free
#     databaseName: voltpc
#     user: voltpc
