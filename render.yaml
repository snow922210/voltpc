# ─── Blueprint Render — déploiement gratuit de VOLT PC ───────────────
# Sur render.com : New ▸ Blueprint ▸ connecter ce dépôt → tout est auto-configuré.
#
# Le blueprint crée aussi une base PostgreSQL managée `voltpc-db`.
# Comptes, paniers, adresses, commandes et favoris sont donc conservés côté
# serveur, même après redéploiement.
#
# ─── Base persistante PostgreSQL (recommandé pour une vraie boutique) ───
# Pour des données qui SURVIVENT aux redéploiements :
#   1. Garder la variable DATABASE_URL ci-dessous.
#   2. Garder le bloc databases en bas de ce fichier.
#   3. Pousser : Render crée la base et l'app bascule automatiquement sur Postgres
#      (le code détecte DATABASE_URL ; sans elle, il repasse sur SQLite local).
# La base est seedée au 1er démarrage (280 produits + compte démo).

services:
  - type: web
    name: voltpc
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/categories
    envVars:
      - key: DEV_SHOW_CODES
        value: ""
      - key: ADMIN_EMAILS
        value: "salut_c_moi@yahoo.com,yohannlemire@gmail.com"
      - key: CORS_ORIGINS
        value: "https://voltcore.fr,https://www.voltcore.fr"
      # Passer à "1" UNIQUEMENT après avoir confirmé que https://voltcore.fr
      # répond avec un certificat valide (custom domain Render OK).
      - key: ENABLE_HSTS
        value: ""
      # Clé de signature stable (sessions conservées entre redémarrages).
      - key: VOLTPC_SECRET
        generateValue: true
      # URL publique du site (redirections Stripe, liens emails).
      - key: PUBLIC_BASE_URL
        value: "https://voltcore.fr"
      # Base serveur persistante : comptes, paniers, commandes, adresses.
      - key: DATABASE_URL
        fromDatabase:
          name: voltpc-db
          property: connectionString
      # Emails transactionnels : renseigner les valeurs privées dans Render.
      # Brevo est recommandé sur Render ; SMTP classique fonctionne aussi selon le fournisseur.
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SHOP_EMAIL
        value: "salut_c_moi@yahoo.com"

# ─── Base de données managée ─────────────────────────────────────────
databases:
  - name: voltpc-db
    plan: free
    databaseName: voltpc
    user: voltpc
